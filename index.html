<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Character Skill Tree</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg: #0b0b0d; --card-bg: #151518; --border: #2a2a2e;
            --t1: #4caf50; --t2: #2196f3; --t3: #ffc107;
            --mastery: #fff700;
        }
        body {
            background-color: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 15px; overflow-x: hidden;
        }
        header { text-align: center; border-bottom: 2px solid #222; margin-bottom: 25px; padding-bottom: 10px; }
        h1 { text-transform: uppercase; letter-spacing: 2px; color: var(--t3); margin: 0; font-size: 1.4rem; }

        .skill-section { margin-bottom: 40px; }
        .skill-name { 
            font-size: 1.3rem; text-transform: uppercase; margin-bottom: 15px; 
            color: #fff; border-left: 5px solid var(--t3); padding-left: 12px; font-weight: bold;
        }
        .card-row { display: flex; flex-direction: column; gap: 15px; }
        .card {
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
            width: 100%; display: flex; align-items: center; position: relative; min-height: 110px;
            transition: all 0.4s ease; overflow: hidden;
        }

        @keyframes ambientGlow {
            0% { box-shadow: 0 0 5px var(--glow-color); }
            50% { box-shadow: 0 0 20px var(--glow-color); }
            100% { box-shadow: 0 0 5px var(--glow-color); }
        }

        .card.active.tier-1 { --glow-color: rgba(76, 175, 80, 0.2); border-left: 6px solid var(--t1); animation: ambientGlow 3s infinite ease-in-out; }
        .card.active.tier-2 { --glow-color: rgba(33, 150, 243, 0.3); border-left: 6px solid var(--t2); animation: ambientGlow 3s infinite ease-in-out; }
        .card.active.tier-3 { --glow-color: rgba(255, 193, 7, 0.4); border-left: 6px solid var(--t3); animation: ambientGlow 3s infinite ease-in-out; }
        .card.mastered { border: 2px solid var(--mastery); --glow-color: rgba(255, 247, 0, 0.6); animation: ambientGlow 1.5s infinite ease-in-out; }
        
        .card.locked { opacity: 0.15; filter: grayscale(1); }

        .image-box {
            width: 90px; height: 90px; flex-shrink: 0; background: #000;
            margin: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.2s;
        }
        .image-box img { width: 80%; height: 80%; object-fit: contain; }

        /* Zoom Overlay */
        #zoom-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); cursor: pointer;
        }
        #zoom-overlay.show { display: flex; }
        #zoomed-img { width: 250px; height: 250px; object-fit: contain; transition: transform 0.3s; }
        #zoom-text { 
            margin-top: 30px; font-size: 1.4rem; color: #fff; text-align: center; 
            max-width: 85%; line-height: 1.5; font-weight: bold; opacity: 0; transform: translateY(20px);
        }
        #zoom-text.visible { opacity: 1; transform: translateY(0); transition: all 0.3s; }

        .content { padding: 12px 15px 12px 5px; flex-grow: 1; }
        .tier-label { font-weight: 900; text-transform: uppercase; font-size: 0.9rem; }
        .badge { font-size: 0.7rem; padding: 3px 7px; border-radius: 4px; float: right; background: #333; font-weight: bold; }
        .active .badge { background: #2e7d32; }

        .desc { font-size: 1rem; color: #bbb; margin: 6px 0; line-height: 1.2; }
        .xp-container { background: #000; height: 12px; border-radius: 6px; margin-top: 10px; width: 100%; overflow: hidden;}
        .xp-bar { height: 100%; width: 0%; transition: width 0.4s; }
        .tier-1 .xp-bar { background: var(--t1); }
        .tier-2 .xp-bar { background: var(--t2); }
        .tier-3 .xp-bar { background: var(--t3); }

        .controls { display: flex; gap: 8px; margin-top: 12px; }
        button { border: 1px solid #444; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: bold; color: white; }
        .btn-plus { flex-grow: 1; padding: 15px; background: #222; }
        .btn-minus { width: 50px; background: #1a1a1a; color: #ff4444; }

        #celebration-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: none; align-items: center; justify-content: center; }
        #celebration-overlay.show { display: flex; }

        @media (min-width: 768px) {
            .card-row { flex-direction: row; }
            .card { flex-direction: column; width: 32%; text-align: center; }
            .image-box { width: 100%; height: 130px; margin: 0; border-radius: 0; }
            .content { padding: 15px; }
        }
    </style>
</head>
<body>

<header><h1>Character Skill Tree</h1></header>
<div id="app"></div>

<div id="zoom-overlay" onclick="handleZoomClick()">
    <img id="zoomed-img" src="" alt="Zoomed Skill">
    <div id="zoom-text"></div>
</div>

<div id="celebration-overlay">
    <div style="width: 300px; text-align: center;">
        <h2 style="color: var(--mastery);">MASTERY ACHIEVED</h2>
        <div class="tenor-gif-embed" data-postid="1309218732423981129" data-share-method="host" data-aspect-ratio="1" data-width="100%"><a href="https://tenor.com/view/winner-champ-champion-trophy-good-job-gif-1309218732423981129">Winner Champ Sticker</a></div> <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f=440) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type='triangle'; o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.5);
    }

    const skillData = [
        { 
            name: "Presentation", prefix: "pres", xp: 0, m1: 5, m2: 15, m3: 35,
            quotes: [
                "You're getting there! Your presentation is smooth and the foundation is solid.",
                "You've found your rhythm. You use visuals as a weapon rather than a crutch.",
                "Master Presenter and Objection Handler. No one can stop you. You command the room!"
            ]
        },
        { 
            name: "Athleticism", prefix: "ath", xp: 0, m1: 30, m2: 90, m3: 180,
            quotes: [
                "Building the engine. You have established a consistent routine and stamina is climbing.",
                "Power and precision. You have mastered the mechanics of movement.",
                "Peak physical condition. Your body is a finely tuned machine."
            ]
        },
        { 
            name: "Negotiation", prefix: "nego", xp: 0, m1: 5, m2: 20, m3: 50,
            quotes: [
                "Learning the leverage. You understand the basics of value exchange.",
                "The Art of the Deal. You find 'Win-Win' scenarios others miss.",
                "Unstoppable Influence. You orchestrate outcomes before the meeting begins."
            ]
        },
        { 
            name: "Public Speaking", prefix: "publ", xp: 0, m1: 5, m2: 20, m3: 50,
            quotes: [
                "Voice found! You can address a group clearly, overcoming 'Stage Fright'.",
                "Captivating the crowd. Your vocal tonality keeps attention locked.",
                "Absolute Charisma. Your words inspire action across the masses."
            ]
        }
    ];

    let zoomStep = 0;

    function openZoom(sIdx, tIdx) {
        const overlay = document.getElementById('zoom-overlay');
        const img = document.getElementById('zoomed-img');
        const txt = document.getElementById('zoom-text');
        
        img.src = `${skillData[sIdx].prefix}${tIdx + 1}.png`;
        txt.innerText = skillData[sIdx].quotes[tIdx];
        
        overlay.classList.add('show');
        txt.classList.remove('visible');
        zoomStep = 1;
        playSound(523);
    }

    function handleZoomClick() {
        const txt = document.getElementById('zoom-text');
        const overlay = document.getElementById('zoom-overlay');
        if (zoomStep === 1) { txt.classList.add('visible'); zoomStep = 2; } 
        else if (zoomStep === 2) { overlay.classList.remove('show'); zoomStep = 0; }
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = skillData.map((skill, sIdx) => {
            const currentTier = skill.xp >= skill.m2 ? 3 : (skill.xp >= skill.m1 ? 2 : 1);
            return `
            <div class="skill-section">
                <div class="skill-name">${skill.name} (${skill.xp} XP)</div>
                <div class="card-row">
                    ${[1, 2, 3].map(t => {
                        const active = currentTier === t;
                        const locked = currentTier < t;
                        const done = currentTier > t;
                        const isMastered = (t === 3 && skill.xp >= skill.m3);
                        let prog = active ? (t === 1 ? (skill.xp/skill.m1)*100 : (t === 2 ? ((skill.xp-skill.m1)/(skill.m2-skill.m1))*100 : ((skill.xp-skill.m2)/(skill.m3-skill.m2))*100)) : (done ? 100 : 0);

                        return `
                        <div class="card tier-${t} ${active ? 'active' : ''} ${locked ? 'locked' : ''} ${isMastered ? 'mastered' : ''}">
                            <div class="image-box" onclick="openZoom(${sIdx}, ${t-1})">
                                <img src="${skill.prefix}${t}.png" onerror="this.src='https://via.placeholder.com/80?text=PNG'">
                            </div>
                            <div class="content">
                                <span class="badge">${isMastered ? 'MASTERED' : (active ? 'ACTIVE' : (locked ? 'LOCKED' : 'DONE'))}</span>
                                <span class="tier-label" style="color:var(--t${t})">Tier ${t}</span>
                                <div class="desc">${skill.quotes[t-1].substring(0, 35)}...</div>
                                ${active && !isMastered ? `
                                    <div class="xp-container"><div class="xp-bar" style="width:${prog}%"></div></div>
                                    <div class="controls">
                                        <button class="btn-minus" onclick="modifyXP(${sIdx},-1)">−</button>
                                        <button class="btn-plus" onclick="modifyXP(${sIdx},1)">Log Practice</button>
                                    </div>` : ''}
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }).join('');
        localStorage.setItem('myRPGSavV8', JSON.stringify(skillData));
    }

    window.modifyXP = (i, n) => {
        const s = skillData[i];
        const oldXP = s.xp;
        s.xp = Math.max(0, Math.min(s.m3, s.xp + n));
        if (s.xp !== oldXP) {
            playSound(440);
            if (oldXP < s.m3 && s.xp >= s.m3) {
                document.getElementById('celebration-overlay').classList.add('show');
                confetti({ particleCount: 400, spread: 100, origin: { y: 0.6 } });
                setTimeout(() => document.getElementById('celebration-overlay').classList.remove('show'), 5000);
            }
            render();
        }
    }

    const saved = localStorage.getItem('myRPGSavV8');
    if(saved) JSON.parse(saved).forEach((s, i) => { if(skillData[i]) skillData[i].xp = s.xp; });
    render();
</script>
</body>
</html>
